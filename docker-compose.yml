services:
  api:
    build: .
    environment:
      SECMIND_ENV: production
      SECMIND_DEMO_MODE: ${SECMIND_DEMO_MODE:-true}
      SECMIND_DATABASE_URL: postgresql+psycopg://secmind:${POSTGRES_PASSWORD:-secmind_dev}@postgres:5432/secmind
      SECMIND_INPUT_ROOT: /app/data/inputs
      SECMIND_UPLOAD_ROOT: /app/data/uploads
      SECMIND_RUN_ROOT: /app/data/runs
      SECMIND_QWEN_BASE_URL: ${SECMIND_QWEN_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      SECMIND_QWEN_API_KEY: ${SECMIND_QWEN_API_KEY:-}
      SECMIND_PLANNER_MODEL: ${SECMIND_PLANNER_MODEL:-qwen-plus}
      SECMIND_WORKER_MODEL: ${SECMIND_WORKER_MODEL:-qwen-turbo}
      SECMIND_FALLBACK_MODEL: ${SECMIND_FALLBACK_MODEL:-qwen-max}
      SECMIND_EMBEDDING_MODEL: ${SECMIND_EMBEDDING_MODEL:-text-embedding-v3}
      SECMIND_QDRANT_URL: http://qdrant:6333
      SECMIND_QDRANT_COLLECTION: ${SECMIND_QDRANT_COLLECTION:-secmind_knowledge}
    ports:
      - "8000:8000"
    volumes:
      - secmind_data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    read_only: true
    tmpfs:
      - /tmp:size=256m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: secmind
      POSTGRES_USER: secmind
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secmind_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U secmind -d secmind"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.13.2
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  secmind_data:
  postgres_data:
  qdrant_data:
